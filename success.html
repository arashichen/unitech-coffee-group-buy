<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>感謝您的預約 - 大店長晨會 × 台新餐飲設備</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
      background: linear-gradient(135deg, #00B5E2 0%, #004C97 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .success-container {
      background: white;
      border-radius: 8px;
      padding: 60px 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 10px 40px rgba(0,76,151,.2);
    }
    .checkmark {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      background: #00B5E2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
    }
    h1 {
      color: #004C97;
      font-size: 28px;
      margin-bottom: 16px;
      font-weight: 800;
    }
    p {
      color: #6B7280;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .highlight {
      color: #E63535;
      font-weight: 700;
    }
    .button {
      display: inline-block;
      background: #004C97;
      color: white;
      padding: 12px 32px;
      border-radius: 4px;
      text-decoration: none;
      margin-top: 30px;
      font-weight: 600;
      transition: all .3s;
    }
    .button:hover {
      background: #00B5E2;
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="checkmark">✓</div>

    <p>我們的業務團隊會在 <span class="highlight">24 小時內</span> 與您聯繫</p>
    <p style="margin-top: 24px; color: #999; font-size: 14px;">
      確認信已寄送至您的信箱，如有任何疑問可直接回信詢問
    </p>
    <a href="landing-final.html" class="button">返回首頁</a>
  </div>
</body>
</html>
